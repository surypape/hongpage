<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날짜 생존기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
'use strict';

// ─── 기본 설정 ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width  = 800;
const H = canvas.height = 600;
const HUD_H = 80;
const PLAY = { x: 0, y: HUD_H, w: W, h: H - HUD_H };

// ─── 날짜 유틸 ─────────────────────────────────────────────────────────────────
const DAYS_IN_MONTH = [0, 31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
const TOTAL_DAYS = 365;

function doyToDate(doy) {
    let m = 1, d = Math.max(1, doy);
    while (m <= 12 && d > DAYS_IN_MONTH[m]) { d -= DAYS_IN_MONTH[m]; m++; }
    return { month: Math.min(m, 12), day: d };
}

const SPECIAL_DATES = {
    '1-1':   { name: '새해',        color: '#ffffaa' },
    '2-14':  { name: '발렌타인데이', color: '#ff88bb' },
    '3-1':   { name: '삼일절',      color: '#4488ff' },
    '5-5':   { name: '어린이날',    color: '#44ee88' },
    '6-6':   { name: '현충일',      color: '#9966ff' },
    '6-25':  { name: '6.25 전쟁',  color: '#ff4444' },
    '8-15':  { name: '광복절',      color: '#ffaa44' },
    '10-3':  { name: '개천절',      color: '#44ccff' },
    '10-9':  { name: '한글날',      color: '#cc88ff' },
    '10-31': { name: '할로윈',      color: '#ff7722' },
    '11-11': { name: '빼빼로데이',  color: '#ffaacc' },
    '12-25': { name: '크리스마스',  color: '#55ffaa' },
    '12-31': { name: '새해 전날',   color: '#ffffff' },
};

function getSpecialDate(month, day) {
    return SPECIAL_DATES[`${month}-${day}`] || null;
}

// ─── 게임 상수 ─────────────────────────────────────────────────────────────────
const MAX_LIVES          = 2;
const INVINCIBLE_DURATION = 2000;  // ms
const DATE_INTERVAL_MAX  = 2800;   // 초반 날짜 간격 ms
const DATE_INTERVAL_MIN  = 900;    // 후반 날짜 간격 ms

// ─── 게임 상태 ─────────────────────────────────────────────────────────────────
let g = {};

function initState() {
    g = {
        phase: 'title',  // title | playing | gameover | clear
        doy: 1,
        lives: MAX_LIVES,
        survivalTime: 0,

        player: null,
        bullets: [],
        particles: [],

        dateTimer: 0,
        bulletTimer: 0,
        spiralAngle: 0,

        invincible: false,
        invincibleTimer: 0,
        flashTimer: 0,

        specialEvent: null,
    };
}

// ─── 키 입력 ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
    if (!keys[e.code]) {
        keys[e.code] = true;
        onKeyPress(e.code);
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))
        e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function onKeyPress(code) {
    if (code === 'Space' || code === 'Enter' || code === 'NumpadEnter') {
        if (g.phase === 'title')                   startGame();
        else if (g.phase === 'gameover' || g.phase === 'clear') initState();
    }
}

// ─── 난이도 ────────────────────────────────────────────────────────────────────
function diff()           { return (g.doy - 1) / (TOTAL_DAYS - 1); }
function bulletSpeed()    { return 2.0 + diff() * 5.5; }
function bulletCount()    { return Math.floor(1 + diff() * 7); }
function spawnInterval()  { return Math.max(320, 1300 - diff() * 980); }
function dateInterval()   { return DATE_INTERVAL_MAX - diff() * (DATE_INTERVAL_MAX - DATE_INTERVAL_MIN); }

// ─── 플레이어 ──────────────────────────────────────────────────────────────────
function createPlayer() {
    return { x: W / 2, y: PLAY.y + PLAY.h / 2, r: 8, displayR: 14, speed: 4.5 };
}

// ─── 탄막 ──────────────────────────────────────────────────────────────────────
const COLORS = ['#ff4466','#ff8844','#ffdd22','#44ff88','#44aaff','#aa44ff','#ff44aa'];
function rndColor() { return COLORS[Math.random() * COLORS.length | 0]; }

function rndEdge() {
    switch (Math.random() * 4 | 0) {
        case 0: return { x: Math.random() * W, y: PLAY.y - 10, nx:  0, ny:  1 };
        case 1: return { x: W + 10, y: PLAY.y + Math.random() * PLAY.h, nx: -1, ny:  0 };
        case 2: return { x: Math.random() * W, y: H + 10, nx:  0, ny: -1 };
        default: return { x: -10, y: PLAY.y + Math.random() * PLAY.h, nx:  1, ny:  0 };
    }
}

function mkBullet(x, y, vx, vy, r, color) {
    return { x, y, vx, vy, r: r || 6, color: color || rndColor() };
}

function spawnBullets() {
    const d = diff(), spd = bulletSpeed(), cnt = bulletCount();

    const available = ['linear'];
    if (d > 0.12) available.push('aimed');
    if (d > 0.28) available.push('burst');
    if (d > 0.48) available.push('spiral');
    if (d > 0.68) available.push('curtain');
    if (d > 0.84) available.push('double');

    const pat = available[Math.random() * available.length | 0];
    switch (pat) {
        case 'linear':  spawnLinear(cnt, spd);                                   break;
        case 'aimed':   spawnAimed(cnt, spd);                                    break;
        case 'burst':   spawnBurst(cnt, spd);                                    break;
        case 'spiral':  spawnSpiral(spd);                                        break;
        case 'curtain': spawnCurtain(spd);                                       break;
        case 'double':
            spawnLinear(Math.ceil(cnt / 2), spd);
            spawnAimed(Math.ceil(cnt / 2), spd);
            break;
    }
}

function spawnLinear(cnt, spd) {
    for (let i = 0; i < cnt; i++) {
        const e = rndEdge();
        const sp = (Math.random() - 0.5) * 0.6;
        g.bullets.push(mkBullet(
            e.x, e.y,
            e.nx * spd + (e.ny !== 0 ? sp : 0),
            e.ny * spd + (e.nx !== 0 ? sp : 0),
            6, rndColor()
        ));
    }
}

function spawnAimed(cnt, spd) {
    const px = g.player ? g.player.x : W / 2;
    const py = g.player ? g.player.y : H / 2;
    for (let i = 0; i < cnt; i++) {
        const e = rndEdge();
        const dx = px - e.x, dy = py - e.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const sp = (Math.random() - 0.5) * 0.5;
        g.bullets.push(mkBullet(e.x, e.y, dx / len * spd + sp, dy / len * spd + sp, 7, '#ff6688'));
    }
}

function spawnBurst(cnt, spd) {
    const e = rndEdge();
    const total = cnt * 3 + 6;
    for (let i = 0; i < total; i++) {
        const a = (i / total) * Math.PI * 2;
        g.bullets.push(mkBullet(e.x, e.y, Math.cos(a) * spd, Math.sin(a) * spd, 5, '#ffaa33'));
    }
}

function spawnSpiral(spd) {
    const arms = 2 + Math.floor(diff() * 3);
    const cx = W / 2 + (Math.random() - 0.5) * 180;
    const cy = PLAY.y + PLAY.h / 2 + (Math.random() - 0.5) * 100;
    for (let a = 0; a < arms; a++) {
        const angle = g.spiralAngle + (a / arms) * Math.PI * 2;
        g.bullets.push(mkBullet(cx, cy, Math.cos(angle) * spd, Math.sin(angle) * spd, 6, '#33ffcc'));
    }
    g.spiralAngle += 0.28;
}

function spawnCurtain(spd) {
    const fromTop = Math.random() > 0.5;
    const gapCenter = 60 + Math.random() * (W - 120);
    const gapSize   = Math.max(75, 160 - diff() * 85);
    for (let i = 0; i <= 18; i++) {
        const bx = (i / 18) * W;
        if (Math.abs(bx - gapCenter) < gapSize / 2) continue;
        g.bullets.push(mkBullet(bx, fromTop ? PLAY.y - 10 : H + 10, 0, fromTop ? spd : -spd, 8, '#9944ff'));
    }
}

// ─── 파티클 ────────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, cnt = 10) {
    for (let i = 0; i < cnt; i++) {
        const a = (i / cnt) * Math.PI * 2 + Math.random() * 0.5;
        const spd = 1.5 + Math.random() * 3;
        g.particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
                           r: 2 + Math.random() * 4, life: 1.0, color });
    }
}

// ─── 게임 진행 ─────────────────────────────────────────────────────────────────
function startGame() {
    g.phase  = 'playing';
    g.player = createPlayer();
    refreshSpecialEvent();
}

function refreshSpecialEvent() {
    const { month, day } = doyToDate(g.doy);
    g.specialEvent = getSpecialDate(month, day);
}

function update(dt) {
    if (g.phase !== 'playing') return;

    g.survivalTime += dt;

    // 날짜 진행
    g.dateTimer += dt;
    if (g.dateTimer >= dateInterval()) {
        g.dateTimer = 0;
        g.doy++;
        if (g.doy > TOTAL_DAYS) { g.phase = 'clear'; return; }
        refreshSpecialEvent();
    }

    // 탄막 스폰
    g.bulletTimer += dt;
    if (g.bulletTimer >= spawnInterval()) {
        g.bulletTimer = 0;
        spawnBullets();
    }

    // 플레이어 이동
    const p = g.player;
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
    if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
    if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
    if (dx && dy) { dx *= 0.7071; dy *= 0.7071; }
    const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? p.speed * 0.42 : p.speed;
    p.x = Math.max(p.displayR, Math.min(W - p.displayR, p.x + dx * spd));
    p.y = Math.max(PLAY.y + p.displayR, Math.min(H - p.displayR, p.y + dy * spd));

    // 무적 타이머
    if (g.invincible) {
        g.invincibleTimer -= dt;
        if (g.invincibleTimer <= 0) g.invincible = false;
    }
    if (g.flashTimer > 0) g.flashTimer -= dt;

    // 탄막 업데이트 & 충돌
    const pr = p.r;
    g.bullets = g.bullets.filter(b => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < -70 || b.x > W + 70 || b.y < PLAY.y - 70 || b.y > H + 70) return false;
        if (!g.invincible) {
            const dx = b.x - p.x, dy = b.y - p.y;
            if (dx * dx + dy * dy < (pr + b.r) * (pr + b.r)) {
                hitPlayer(); return false;
            }
        }
        return true;
    });

    // 파티클 업데이트
    g.particles = g.particles.filter(pt => {
        pt.x += pt.vx; pt.y += pt.vy;
        pt.vx *= 0.93; pt.vy *= 0.93;
        pt.life -= 0.025;
        return pt.life > 0;
    });
}

function hitPlayer() {
    spawnParticles(g.player.x, g.player.y, '#ff4466', 14);
    g.lives--;
    g.invincible      = true;
    g.invincibleTimer = INVINCIBLE_DURATION;
    g.flashTimer      = 280;
    if (g.lives <= 0) g.phase = 'gameover';
}

// ─── 그리기 ────────────────────────────────────────────────────────────────────
function draw(ts) {
    ctx.fillStyle = '#080814';
    ctx.fillRect(0, 0, W, H);

    if (g.phase === 'title')    { drawTitle(ts);           return; }
    if (g.phase === 'gameover') { drawOverlay('gameover', ts); return; }
    if (g.phase === 'clear')    { drawOverlay('clear', ts);    return; }

    drawPlayArea();
    drawBullets();
    drawParticles();
    drawPlayer(ts);
    drawHUD(ts);

    if (g.flashTimer > 0) {
        ctx.fillStyle = `rgba(255,40,40,${(g.flashTimer / 280) * 0.28})`;
        ctx.fillRect(0, PLAY.y, W, PLAY.h);
    }
}

function drawPlayArea() {
    ctx.fillStyle = '#09091a';
    ctx.fillRect(PLAY.x, PLAY.y, PLAY.w, PLAY.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.022)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, PLAY.y); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = PLAY.y; y <= H; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
}

function drawBullets() {
    g.bullets.forEach(b => {
        ctx.save();
        ctx.shadowBlur  = 14;
        ctx.shadowColor = b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = b.color; ctx.fill();
        ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.38, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.82)'; ctx.fill();
        ctx.restore();
    });
}

function drawParticles() {
    g.particles.forEach(pt => {
        ctx.save();
        ctx.globalAlpha = pt.life;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r * pt.life, 0, Math.PI * 2);
        ctx.fillStyle = pt.color; ctx.fill();
        ctx.restore();
    });
}

function drawPlayer(ts) {
    if (!g.player) return;
    if (g.invincible && Math.floor(ts / 80) % 2 === 0) return;
    const p = g.player;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.shadowBlur = 18; ctx.shadowColor = '#0088ff';

    // 선체
    ctx.beginPath();
    ctx.moveTo(0, -p.displayR);
    ctx.lineTo(-p.displayR * 0.72, p.displayR * 0.68);
    ctx.lineTo(0, p.displayR * 0.26);
    ctx.lineTo(p.displayR * 0.72, p.displayR * 0.68);
    ctx.closePath();
    ctx.fillStyle = '#55bbff'; ctx.fill();

    // 콕핏
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(0, -p.displayR * 0.22, p.displayR * 0.26, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,240,255,0.9)'; ctx.fill();

    // 히트박스 점
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
    ctx.restore();
}

// ─── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD(ts) {
    ctx.fillStyle = '#0c0c20';
    ctx.fillRect(0, 0, W, HUD_H);
    ctx.strokeStyle = '#1e1e38'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, HUD_H); ctx.lineTo(W, HUD_H); ctx.stroke();

    const { month, day } = doyToDate(g.doy);
    const progress = (g.doy - 1) / (TOTAL_DAYS - 1);

    // ── 중앙: 날짜 ──
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ddeeff';
    ctx.font = 'bold 26px "Malgun Gothic","Apple SD Gothic Neo",sans-serif';
    ctx.fillText(`${month}월 ${day}일`, W / 2, 28);

    // 진행 바
    const bw = 224, bh = 7, bx = W / 2 - bw / 2, by = 36;
    ctx.fillStyle = '#181830'; roundRect(bx, by, bw, bh, 4); ctx.fill();
    if (progress > 0) {
        const fc = progressColor(progress);
        ctx.fillStyle = fc; ctx.shadowBlur = 6; ctx.shadowColor = fc;
        roundRect(bx, by, bw * progress, bh, 4); ctx.fill();
        ctx.shadowBlur = 0;
    }
    ctx.strokeStyle = '#2a2a44'; ctx.lineWidth = 1;
    roundRect(bx, by, bw, bh, 4); ctx.stroke();

    ctx.font = '11px "Malgun Gothic",sans-serif';
    ctx.fillStyle = '#445';
    ctx.fillText(`Day ${g.doy} / ${TOTAL_DAYS}`, W / 2, 58);

    // ── 왼쪽: 목숨 ──
    ctx.textAlign = 'left';
    ctx.font = '12px "Malgun Gothic",sans-serif';
    ctx.fillStyle = '#667';
    ctx.fillText('목숨', 14, 17);
    for (let i = 0; i < MAX_LIVES; i++) drawHeart(26 + i * 28, 44, 10, i < g.lives);

    // ── 오른쪽: 특수 이벤트 ──
    ctx.textAlign = 'right';
    ctx.font = '12px "Malgun Gothic",sans-serif';
    ctx.fillStyle = '#667';
    ctx.fillText('특수 이벤트', W - 14, 17);

    if (g.specialEvent) {
        const ev = g.specialEvent;
        const pulse = 0.82 + 0.18 * Math.sin(ts / 280);
        ctx.font = 'bold 15px "Malgun Gothic",sans-serif';
        ctx.fillStyle = ev.color;
        ctx.shadowBlur = 10 * pulse; ctx.shadowColor = ev.color;
        ctx.globalAlpha = pulse;
        ctx.fillText(`★ ${ev.name}`, W - 14, 37);
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        ctx.font = '11px "Malgun Gothic",sans-serif';
        ctx.fillStyle = '#554466';
        ctx.fillText('특수 패턴 준비 중', W - 14, 56);
    } else {
        ctx.font = '15px "Malgun Gothic",sans-serif';
        ctx.fillStyle = '#2a2a3e';
        ctx.fillText('없음', W - 14, 40);
    }
}

function drawHeart(cx, cy, size, filled) {
    const s = size / 16;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    let first = true;
    for (let t = 0; t <= Math.PI * 2 + 0.05; t += 0.1) {
        const x =  16 * Math.pow(Math.sin(t), 3) * s;
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * s;
        if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
    }
    ctx.closePath();
    if (filled) {
        ctx.fillStyle = '#ff3355'; ctx.shadowBlur = 8; ctx.shadowColor = '#ff2244';
    } else {
        ctx.fillStyle = '#28101a';
    }
    ctx.fill(); ctx.shadowBlur = 0;
    ctx.restore();
}

function roundRect(x, y, w, h, r) {
    if (w <= 0) return;
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function progressColor(t) {
    if (t < 0.5) return `rgb(${Math.round(t * 2 * 220)},220,60)`;
    return `rgb(220,${Math.round((1 - t) * 2 * 220)},60)`;
}

// ─── 타이틀 화면 ───────────────────────────────────────────────────────────────
function drawTitle(ts) {
    ctx.fillStyle = '#08081a'; ctx.fillRect(0, 0, W, H);

    // 별
    for (let i = 0; i < 90; i++) {
        const x = (Math.sin(i * 1.37) * 0.5 + 0.5) * W;
        const y = (Math.cos(i * 1.71) * 0.5 + 0.5) * H;
        const r = 0.4 + 0.6 * Math.abs(Math.sin(ts / 500 + i));
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,210,255,${0.25 + 0.25 * Math.sin(ts / 900 + i)})`;
        ctx.fill();
    }

    const my = H / 2 - 96;
    ctx.textAlign = 'center';

    ctx.font = 'bold 48px "Malgun Gothic","Apple SD Gothic Neo",sans-serif';
    ctx.shadowBlur = 32; ctx.shadowColor = '#3355ff';
    ctx.fillStyle = '#aabbff';
    ctx.fillText('날짜 생존기', W / 2, my);
    ctx.shadowBlur = 0;

    ctx.font = '18px "Malgun Gothic",sans-serif';
    ctx.fillStyle = '#6677aa';
    ctx.fillText('365일의 탄막을 피해 살아남아라', W / 2, my + 48);

    ctx.font = '14px "Malgun Gothic",sans-serif';
    ctx.fillStyle = '#445566';
    ctx.fillText('이동: 방향키 / WASD', W / 2, my + 100);
    ctx.fillText('저속 이동: Shift', W / 2, my + 124);
    ctx.fillText('목숨 2개 — 1번 피격은 봐줌', W / 2, my + 148);
    ctx.fillText('날짜가 지날수록 탄막이 강해짐', W / 2, my + 172);

    if (Math.floor(ts / 560) % 2 === 0) {
        ctx.font = 'bold 18px "Malgun Gothic",sans-serif';
        ctx.fillStyle = '#eeeeff';
        ctx.shadowBlur = 10; ctx.shadowColor = '#7799ff';
        ctx.fillText('[ 스페이스바 / 엔터 ] 로 시작', W / 2, my + 224);
        ctx.shadowBlur = 0;
    }
}

// ─── 게임오버 / 클리어 오버레이 ────────────────────────────────────────────────
function drawOverlay(type, ts) {
    drawPlayArea(); drawBullets(); drawParticles(); drawHUD(ts);

    ctx.fillStyle = 'rgba(5,5,18,0.76)';
    ctx.fillRect(0, HUD_H, W, PLAY.h);

    ctx.textAlign = 'center';

    if (type === 'gameover') {
        ctx.font = 'bold 54px "Malgun Gothic","Apple SD Gothic Neo",sans-serif';
        ctx.shadowBlur = 28; ctx.shadowColor = '#ff2244';
        ctx.fillStyle = '#ff4466';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 58);
        ctx.shadowBlur = 0;

        const { month, day } = doyToDate(g.doy);
        ctx.font = '22px "Malgun Gothic",sans-serif';
        ctx.fillStyle = '#aabbcc';
        ctx.fillText(`${month}월 ${day}일 (${g.doy}일차) 에 산화`, W / 2, H / 2 + 2);

        ctx.font = '16px "Malgun Gothic",sans-serif';
        ctx.fillStyle = '#6677aa';
        ctx.fillText(`생존 시간: ${Math.floor(g.survivalTime / 1000)}초`, W / 2, H / 2 + 36);

    } else {
        const fsize = 48 + Math.round(2 * Math.sin(ts / 200));
        ctx.font = `bold ${fsize}px "Malgun Gothic","Apple SD Gothic Neo",sans-serif`;
        ctx.shadowBlur = 32; ctx.shadowColor = '#ffdd44';
        ctx.fillStyle = '#ffee88';
        ctx.fillText('★  CLEAR!  ★', W / 2, H / 2 - 58);
        ctx.shadowBlur = 0;

        ctx.font = '22px "Malgun Gothic",sans-serif';
        ctx.fillStyle = '#aaccee';
        ctx.fillText('365일을 모두 살아남았습니다!', W / 2, H / 2 + 2);

        ctx.font = '16px "Malgun Gothic",sans-serif';
        ctx.fillStyle = '#6688aa';
        ctx.fillText(`클리어 시간: ${Math.floor(g.survivalTime / 1000)}초`, W / 2, H / 2 + 36);
    }

    if (Math.floor(ts / 560) % 2 === 0) {
        ctx.font = '17px "Malgun Gothic",sans-serif';
        ctx.fillStyle = '#eeeeff';
        ctx.fillText('[ 스페이스바 ] 로 다시 시작', W / 2, H / 2 + 90);
    }
}

// ─── 메인 루프 ─────────────────────────────────────────────────────────────────
let lastTs = 0;

function loop(ts) {
    const dt = Math.min(ts - lastTs, 50);
    lastTs = ts;
    update(dt);
    draw(ts);
    requestAnimationFrame(loop);
}

initState();
requestAnimationFrame(loop);
</script>
</body>
</html>
